name: newsteam

services:
  demo:
    profiles: ["demo"]
    build: .
    env_file:
      - path: .env
        required: false
    command: ["node", "dist/demo.js"]
    environment:
      DASHBOARD_HOST: 0.0.0.0
    ports:
      - "127.0.0.1:7777:7777"
    stdin_open: true
    tty: true

  newsteam:
    build: .
    env_file:
      - .env
    environment:
      DASHBOARD_HOST: 0.0.0.0
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./persona:/app/persona
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:7777:7777"
    restart: unless-stopped
