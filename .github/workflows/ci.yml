name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  node:
    name: Node 22
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

  python:
    name: Python 3.11
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Test feed tools
        run: python3 -m unittest tests/test_feed_check.py tests/test_feed_manage.py -v
